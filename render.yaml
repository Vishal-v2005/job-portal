# Deploy backend: Render Dashboard → New → Blueprint → connect GitHub repo
services:
  - type: web
    name: job-portal-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py seed_skills
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_VERCEL
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://job-portal-ten-lac.vercel.app"
